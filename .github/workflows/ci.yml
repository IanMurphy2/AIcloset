name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: closet_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d closet_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: user
      DB_PASS: password
      DB_NAME: closet_db
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (TSOA + tsc)
        run: npm run build
      - name: Run tests
        run: npm test

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if frontend exists
        id: check
        run: |
          if [ -f front/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::front/package.json no existe todavía; se omite el job de frontend (se activa al aterrizar la base del frontend, IAN-7)."
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json
      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: front
        run: npm ci
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        working-directory: front
        run: npm run lint
      - name: Test
        if: steps.check.outputs.exists == 'true'
        working-directory: front
        run: npm run test
      - name: Build
        if: steps.check.outputs.exists == 'true'
        working-directory: front
        run: npm run build
